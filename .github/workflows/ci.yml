name: EcoVerse AI CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: ecoverse-ai/package-lock.json

      - name: Install Dependencies
        working-directory: ./ecoverse-ai
        run: npm ci

      - name: Lint Code
        working-directory: ./ecoverse-ai
        run: npm run lint
        continue-on-error: true # Do not break CI on lint warnings, but report them

      - name: Run Tests
        working-directory: ./ecoverse-ai
        run: npm run test

      - name: Build Next.js Application
        working-directory: ./ecoverse-ai
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
